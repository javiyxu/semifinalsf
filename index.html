<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ScheduleHub — Agendas Manager</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        body { font-family: Arial, sans-serif; margin: 0; }
        #app { display: flex; height: 100vh; }
        aside { width: 300px; padding: 20px; background: #f5f5f5; }
        main { flex: 1; padding: 20px; overflow-y: auto; }
        input, select { width: 100%; margin-bottom: 10px; padding: 8px; }
        button { padding: 8px 12px; margin-right: 5px; cursor: pointer; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ccc; padding: 8px; text-align: left; }
        a { color: blue; cursor: pointer; margin-right: 5px; }
    </style>
</head>
<body>
    <div id="app">
        <!-- Sidebar / Form -->
        <aside>
            <h2>Agendas</h2>
            <label>Agenda Title</label>
            <input type="text" id="agenda_title" placeholder="e.g. Review Q2 KPIs">

            <label>Assigned To</label>
            <input type="text" id="assigned_to" placeholder="e.g. Team Lead">

            <label>Priority</label>
            <select id="priority">
                <option value="Critical">Critical</option>
                <option value="High">High</option>
                <option value="Medium" selected>Medium</option>
                <option value="Low">Low</option>
            </select>

            <label>Status</label>
            <select id="status">
                <option value="Pending" selected>Pending</option>
                <option value="In Progress">In Progress</option>
                <option value="Done">Done</option>
                <option value="Deferred">Deferred</option>
                <option value="Cancelled">Cancelled</option>
            </select>

            <label>Due Date</label>
            <input type="date" id="due_date">

            <input type="hidden" id="ID">

            <div>
                <button id="add"><i class="fas fa-plus"></i> Add</button>
                <button id="update" style="display:none;"><i class="fas fa-pen"></i> Update</button>
            </div>
        </aside>

        <!-- Main / Table -->
        <main>
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Title</th>
                        <th>Assigned To</th>
                        <th>Priority</th>
                        <th>Status</th>
                        <th>Due Date</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </main>
    </div>

    <script src="agenda.js"></script>
</body>
</html>
